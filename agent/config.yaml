# Agent-side configuration for the iterative frame-interval localization pipeline.
# See docs/IMPLEMENTATIONS/model-agent-contract.md.

agent:
  tolerance_seconds: 1.0
  max_rounds: 10
  confidence_threshold: 0.5
  max_low_conf_rounds: 2
  backend: "remote"
  temperature: 0.7
  remote:
    provider: "dashscope"
    model: "qwen2.5-14b-instruct"
    base_url: "https://dashscope.aliyuncs.com/compatible-mode/v1"
    api_key: null

  local:
    provider: "ollama"
    model: "qwen3.5:7b"
    base_url: "http://localhost:11434/v1"

# Fine-tuned model backend configuration (used by InferenceClient).
backend:
  api_url: http://localhost:8000/v1
  model: minicpmv4_5
